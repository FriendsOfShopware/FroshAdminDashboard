name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      APP_URL: http://localhost:8000
      # Consumed by .shopware-project.yml for the extension upload.
      SHOPWARE_PROJECT_URL: http://localhost:8000
      SHOPWARE_ADMIN_USERNAME: admin
      SHOPWARE_ADMIN_PASSWORD: shopware

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup shopware-cli
        uses: shopware/shopware-cli-action@v3

      # Package the plugin into a zip (compiles the administration assets).
      - name: Build plugin zip
        run: shopware-cli extension zip . --filename FroshAdminDashboard.zip --output-directory dist

      - name: Start Shopware demo environment
        run: |
          docker run -d --name shopware \
            -e APP_URL="${APP_URL}" \
            -e SHOPWARE_ADMIN_PASSWORD="${SHOPWARE_ADMIN_PASSWORD}" \
            -p 8000:8000 \
            ghcr.io/friendsofshopware/shopware-demo-environment:6.7

      - name: Wait for Shopware to be ready
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/admin" || true)
            echo "attempt ${i}: HTTP ${code}"
            if [ "${code}" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "Shopware did not become ready in time" >&2
          docker logs shopware || true
          exit 1

      # Upload the zip through the Admin API and install + activate it.
      # Connection comes from .shopware-project.yml (env-substituted).
      - name: Upload and activate the plugin
        run: shopware-cli project extension upload dist/FroshAdminDashboard.zip --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browser
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report
          retention-days: 14

      - name: Dump Shopware logs on failure
        if: failure()
        run: docker logs shopware || true
